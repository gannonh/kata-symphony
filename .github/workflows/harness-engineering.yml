name: Harness Engineering Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  harness-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm run lint

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Run unit tests
        run: pnpm run test:unit

      - name: Run integration tests
        run: pnpm run test:integration

      - name: Run coverage gate
        run: pnpm run test:coverage

      - name: Run repo contract check
        run: bash scripts/harness/check_repo_contract.sh

      - name: Run repository lint
        run: bash scripts/harness/lint_repo.sh

      - name: Run markdown freshness check
        run: bash scripts/harness/check_markdown_freshness.sh

      - name: Run docs sync check
        run: bash scripts/harness/check_docs_sync.sh
