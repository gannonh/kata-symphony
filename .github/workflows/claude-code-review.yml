name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Claude Code v2.1.18
        run: |
          npm install --no-save @anthropic-ai/claude-code@2.1.18
          echo "CLAUDE_PATH=${GITHUB_WORKSPACE}/node_modules/.bin/claude" >> "$GITHUB_ENV"
          "${GITHUB_WORKSPACE}/node_modules/.bin/claude" --version

      - name: Run Claude Code Review
        id: claude-review
        # Work around upstream SDK regression in anthropics/claude-code-action@v1.
        # See: https://github.com/anthropics/claude-code-action/issues/892
        uses: anthropics/claude-code-action@01e756b34ef7a1447e9508f674143b07d20c2631
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Use workflow token directly so PRs that modify this workflow don't fail
          # app-token exchange validation against default branch.
          github_token: ${{ github.token }}
          path_to_claude_code_executable: ${{ env.CLAUDE_PATH }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # code-review plugin command signature is `/code-review [--comment]`
          prompt: '/code-review'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
